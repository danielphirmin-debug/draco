<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DRACO GOODS</title>
<style>
body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;}
.loader{text-align:center;color:#c9a84c;}
.spinner{width:40px;height:40px;border:3px solid #3a0000;border-top-color:#c9a84c;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <p>Loading DRACO GOODS...</p>
</div>
<script>
const KEY = "46874f8e3bmsh03e6ab93eaf0defp1e4d77jsn7e7f1ce9f019";
const HOST = "the-sneaker-database.p.rapidapi.com";

function getPrice(brand) {
const b = (brand||’’).toLowerCase();
if (b.includes(‘nike’)||b.includes(‘jordan’)||b.includes(‘adidas’)||b.includes(‘new balance’)||b.includes(‘puma’)||b.includes(‘reebok’)||b.includes(‘converse’)||b.includes(‘vans’)) return 100;
return 200;
}

function getSizes(gender) {
return (gender||’’).toLowerCase().includes(‘women’) ? [‘36’,‘37’,‘38’,‘39’,‘40’,‘41’,‘42’] : [‘38’,‘39’,‘40’,‘41’,‘42’,‘43’,‘44’,‘45’];
}

let cart=[], currentProd=null, currentSz=null, currentPage=0, currentBrand=’’, currentSearch=’’;
const EMAILJS_SVC=“service_xa2wnh9”, EMAILJS_TPL=“template_d0s0ovj”, EMAILJS_KEY=“p7HmFA3H_D2XOu3qE”;
const STRIPE=“https://buy.stripe.com/14A4gs1W16oS0GM52zeZ200”;

async function fetchSneakers(q, brand, page=0) {
try {
let url = `https://${HOST}/sneakers?limit=24&page=${page}`;
if (q) url += `&name=${encodeURIComponent(q)}`;
else if (brand) url += `&brand=${encodeURIComponent(brand)}`;
const r = await fetch(url, {headers:{‘x-rapidapi-host’:HOST,‘x-rapidapi-key’:KEY}});
const d = await r.json();
return d.results||d.sneakers||d||[];
} catch(e) { return []; }
}

function renderGrid(products, append=false) {
const g = document.getElementById(‘grid’);
if (!append) g.innerHTML = ‘’;
if (!products.length && !append) {
g.innerHTML = ‘<div style="grid-column:1/-1;text-align:center;padding:80px;color:#555"><p style="font-size:40px">🔍</p><p>No products found</p></div>’;
return;
}
products.forEach(p => {
const brand=p.brand||’’, name=p.name||p.shoe||’’, colorway=p.colorway||’’;
const img=p.thumbnail||p.image||p.media?.imageUrl||’’;
const price=getPrice(brand), sizes=getSizes(p.gender);
const id=p.id||Math.random().toString(36).substr(2,9);
const d=document.createElement(‘div’);
d.className=‘card’;
const pdata=encodeURIComponent(JSON.stringify({id,name,brand,colorway,img,price,sizes}));
d.innerHTML=` <div class="card-img" onclick="openProd('${pdata}')"> ${img?`<img src="${img}" alt="${name}" loading="lazy" onerror="this.style.display='none'"/>`:'<div style="font-size:40px;color:#ddd">👟</div>'} <div class="overlay"><span class="view-lbl">👁 View</span></div> <div class="pbadge">€${price}</div> </div> <div class="card-body"> <div class="cbrand">${brand}</div> <div class="cname">${name}</div> ${colorway?`<div class="ccolor">${colorway}</div>`:''} <div class="cprice">€${price}</div> </div> <div class="cactions"> <button class="cbuy" onclick="openProd('${pdata}')">🔒 Buy</button> <button class="cadd" onclick="qAdd(${JSON.stringify({id,name,brand,img,price,sizes})})">🛍</button> </div>`;
g.appendChild(d);
});
document.getElementById(‘cnt’).textContent = document.querySelectorAll(’.card’).length + ’ Products’;
document.getElementById(‘loadMoreWrap’).style.display = products.length===24?‘block’:‘none’;
}

async function init() {
document.body.innerHTML = getHTML();
emailjsInit();
const prods = await fetchSneakers(’’,’’,0);
renderGrid(prods);
}

function emailjsInit() {
const s=document.createElement(‘script’);
s.src=‘https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js’;
s.onload=()=>emailjs.init(EMAILJS_KEY);
document.head.appendChild(s);
}

function doSearch() {
const q=document.getElementById(‘hs’).value.trim()||document.getElementById(‘ns’).value.trim();
if(!q)return;
currentSearch=q; currentBrand=’’; currentPage=0;
document.getElementById(‘shopTitle’).textContent=`Results for "${q}"`;
document.querySelectorAll(’.hcat’).forEach(c=>c.classList.remove(‘on’));
scrollToShop();
setLoad(true);
fetchSneakers(q,’’,0).then(r=>{renderGrid(r);setLoad(false);});
}

function loadBrand(brand, el) {
currentBrand=brand; currentSearch=’’; currentPage=0;
document.getElementById(‘hs’).value=’’;
if(document.getElementById(‘ns’))document.getElementById(‘ns’).value=’’;
document.getElementById(‘shopTitle’).textContent=brand||‘All Sneakers’;
document.querySelectorAll(’.hcat’).forEach(c=>c.classList.remove(‘on’));
if(el)el.classList.add(‘on’);
scrollToShop();
setLoad(true);
fetchSneakers(’’,brand,0).then(r=>{renderGrid(r);setLoad(false);});
}

async function loadMore() {
currentPage++;
const btn=document.getElementById(‘lmBtn’);
btn.disabled=true; btn.textContent=‘Loading…’;
const r=await fetchSneakers(currentSearch,currentBrand,currentPage);
renderGrid(r,true);
btn.disabled=false; btn.textContent=‘Load More’;
}

function setLoad(show) { document.getElementById(‘loader’).style.display=show?‘flex’:‘none’; }
function scrollToShop() { document.getElementById(‘shop’).scrollIntoView({behavior:‘smooth’}); }

function openProd(enc) {
const p=JSON.parse(decodeURIComponent(enc));
currentProd=p; currentSz=null;
document.getElementById(‘pImg’).src=p.img||’’;
document.getElementById(‘pBrand’).textContent=p.brand;
document.getElementById(‘pName’).textContent=p.name;
document.getElementById(‘pColor’).textContent=p.colorway||’’;
document.getElementById(‘pPrice’).textContent=`€${p.price}`;
document.getElementById(‘pBuyBtn’).textContent=`🔒 Buy Now — €${p.price}`;
document.getElementById(‘pSizes’).innerHTML=p.sizes.map(s=>`<button class="psz" onclick="selSz('${s}',this)">${s}</button>`).join(’’);
[‘pn’,‘pe’,‘pph’,‘pad’,‘pci’,‘ppo’,‘pco’].forEach(id=>document.getElementById(id).value=’’);
document.getElementById(‘prodOv’).classList.add(‘open’);
document.body.style.overflow=‘hidden’;
}

function selSz(sz,el) { currentSz=sz; document.querySelectorAll(’.psz’).forEach(b=>b.classList.remove(‘sel’)); el.classList.add(‘sel’); }
function closeProd() { document.getElementById(‘prodOv’).classList.remove(‘open’); document.body.style.overflow=’’; }

async function buyNow() {
if(!currentProd)return;
const sz=currentSz||currentProd.sizes[0];
const n=document.getElementById(‘pn’).value.trim(),e=document.getElementById(‘pe’).value.trim(),
ph=document.getElementById(‘pph’).value.trim(),a=document.getElementById(‘pad’).value.trim(),
ci=document.getElementById(‘pci’).value.trim(),po=document.getElementById(‘ppo’).value.trim(),
co=document.getElementById(‘pco’).value.trim();
if(!n||!e||!ph||!a||!ci||!po||!co){toast(‘Please fill all fields ⚠️’);return;}
const btn=document.getElementById(‘pBuyBtn’);
btn.disabled=true; btn.textContent=‘Processing…’;
try {
await emailjs.send(EMAILJS_SVC,EMAILJS_TPL,{name:“🛍 DRACO GOODS — Order”,email:e,
message:`ORDER\n${'='.repeat(30)}\n👤 ${n} | ${e} | ${ph}\n📦 ${a}, ${ci} ${po}, ${co}\n\n• ${currentProd.brand} - ${currentProd.name} | Size: ${sz} | €${currentProd.price}\n💰 TOTAL: €${currentProd.price}\n📅 ${new Date().toLocaleString()}`});
} catch(e){console.warn(e);}
closeProd(); window.open(STRIPE,’_blank’);
}

function addFromProd() {
if(!currentProd)return;
const sz=currentSz||currentProd.sizes[0];
const ex=cart.find(c=>c.id===currentProd.id&&c.sz===sz);
if(ex)ex.qty++;else cart.push({…currentProd,sz,qty:1});
updateCart(); toast(currentProd.name.substring(0,25)+’ added!’); closeProd();
}

function qAdd(p) {
const ex=cart.find(c=>c.id===p.id&&c.sz===p.sizes[0]);
if(ex)ex.qty++;else cart.push({…p,sz:p.sizes[0],qty:1});
updateCart(); toast(p.name.substring(0,25)+’ added!’);
}

function removeCart(id,sz) { cart=cart.filter(c=>!(c.id===id&&c.sz===sz)); updateCart(); }

function updateCart() {
document.getElementById(‘cc’).textContent=cart.reduce((a,c)=>a+c.qty,0);
document.getElementById(‘cTotal’).textContent=`€${cart.reduce((a,c)=>a+c.price*c.qty,0)}`;
const cb=document.getElementById(‘cartBody’);
if(!cart.length){cb.innerHTML=’<div style="text-align:center;padding:60px;color:#444">🛍<p>Cart is empty</p></div>’;return;}
cb.innerHTML=cart.map(c=>`<div class="ci"><div class="ci-img">${c.img?`<img src="${c.img}" alt="${c.name}"/>`:'👟'}</div><div class="ci-info"><div class="ci-brand">${c.brand}</div><div class="ci-name">${c.name}</div><div class="ci-sz">Size: ${c.sz} · Qty: ${c.qty}</div><div class="ci-price">€${c.price*c.qty}</div></div><button class="ci-rm" onclick="removeCart('${c.id}','${c.sz}')">✕</button></div>`).join(’’);
}

function toggleCart() { document.getElementById(‘cartOv’).classList.toggle(‘open’); document.getElementById(‘cartPanel’).classList.toggle(‘open’); updateCart(); }

function cartCheckout() {
if(!cart.length){toast(‘Cart is empty’);return;}
document.getElementById(‘cartOv’).classList.remove(‘open’); document.getElementById(‘cartPanel’).classList.remove(‘open’);
const total=cart.reduce((a,c)=>a+c.price*c.qty,0);
const rows=cart.map(c=>`<div class="or"><span>${c.name.substring(0,26)} ×${c.qty} (${c.sz})</span><span>€${c.price*c.qty}</span></div>`).join(’’);
document.getElementById(‘chkBd’).innerHTML=` <div class="os"><div class="os-t">Order Summary</div>${rows}<div class="or tot"><span>Total</span><span>€${total}</span></div></div> <input class="fi" id="cn" placeholder="Full Name *"/> <input class="fi" id="ce" placeholder="Email *" type="email"/> <input class="fi" id="cp" placeholder="Phone *" type="tel"/> <input class="fi" id="ca" placeholder="Street Address *"/> <div class="fr"><input class="fi" id="cc2" placeholder="City *"/><input class="fi" id="cz" placeholder="Postal Code *"/></div> <input class="fi" id="cco" placeholder="Country *"/> <button class="chk-btn" onclick="submitCart()">🔒 Pay — €${total}</button> <div style="text-align:center;font-size:10px;color:#444;margin-top:8px">🔒 Stripe · Apple Pay · Visa · Mastercard</div>`;
document.getElementById(‘chkBg’).classList.add(‘open’);
}

async function submitCart() {
const n=document.getElementById(‘cn’)?.value.trim(),e=document.getElementById(‘ce’)?.value.trim(),
p=document.getElementById(‘cp’)?.value.trim(),a=document.getElementById(‘ca’)?.value.trim(),
ci=document.getElementById(‘cc2’)?.value.trim(),z=document.getElementById(‘cz’)?.value.trim(),
co=document.getElementById(‘cco’)?.value.trim();
if(!n||!e||!p||!a||!ci||!z||!co){toast(‘Fill all fields ⚠️’);return;}
const total=cart.reduce((a,c)=>a+c.price*c.qty,0);
const items=cart.map(c=>`• ${c.brand} - ${c.name} | Size: ${c.sz} | Qty: ${c.qty} | €${c.price*c.qty}`).join(’\n’);
try{await emailjs.send(EMAILJS_SVC,EMAILJS_TPL,{name:“🛍 DRACO — Order”,email:e,message:`ORDER\n${'='.repeat(30)}\n👤 ${n}|${e}|${p}\n📦 ${a},${ci} ${z},${co}\n\n${items}\n💰 €${total}\n📅 ${new Date().toLocaleString()}`});}catch(e){console.warn(e);}
cart=[]; updateCart(); document.getElementById(‘chkBg’).classList.remove(‘open’);
window.open(STRIPE,’_blank’);
}

function toast(msg) { const t=document.getElementById(‘toast’); t.textContent=msg; t.classList.add(‘show’); setTimeout(()=>t.classList.remove(‘show’),2800); }

.cart-ov{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:3000;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.cart-ov.open{opacity:1;pointer-events:all;}
.cart-panel{position:fixed;top:0;right:-440px;width:440px;max-width:100vw;height:100vh;background:#080000;border-left:1px solid #2a0000;z-index:3001;transition:right 0.35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.cart-panel.open{right:0;}
.cart-hd{padding:16px 20px;border-bottom:1px solid #2a0000;display:flex;align-items:center;justify-content:space-between;}
.cart-hd-t{font-family:‘Playfair Display’,serif;font-size:17px;font-weight:700;}
.cart-x{background:none;border:none;color:#555;font-size:20px;cursor:pointer;}
.cart-body{flex:1;overflow-y:auto;padding:12px;}
.ci{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid #1a0000;}
.ci-img{width:58px;height:58px;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ci-img img{width:90%;height:90%;object-fit:contain;}
.ci-info{flex:1;}
.ci-brand{font-size:9px;color:var(–gold);letter-spacing:0.15em;text-transform:uppercase;}
.ci-name{font-size:11px;margin:2px 0;}
.ci-sz{font-size:10px;color:var(–mid);}
.ci-price{font-size:13px;font-weight:700;margin-top:2px;}
.ci-rm{background:none;border:none;color:#444;cursor:pointer;font-size:14px;align-self:flex-start;margin-left:auto;}
.ci-rm:hover{color:#e55;}
.cart-ft{padding:14px 20px;border-top:1px solid #2a0000;}
.cart-tr{display:flex;justify-content:space-between;margin-bottom:8px;}
.cart-tl{font-size:12px;color:var(–mid);}
.cart-ta{font-size:18px;font-weight:700;}
.cart-note{font-size:11px;color:#555;margin-bottom:11px;line-height:1.5;}
.co-btn{width:100%;background:var(–gold);border:none;color:#000;padding:13px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;margin-bottom:7px;}
.co-btn:hover{background:var(–gold-light);}
.pi{background:#110000;border:1px solid #2a0000;color:#555;font-size:9px;padding:3px 7px;}
.pay-icons{display:flex;gap:5px;justify-content:center;margin-top:7px;}
.chk-bg{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:4000;display:none;align-items:center;justify-content:center;padding:14px;}
.chk-bg.open{display:flex;}
.chk-box{background:#080000;border:1px solid #2a0000;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.chk-hd{padding:15px 18px;border-bottom:1px solid #2a0000;display:flex;justify-content:space-between;align-items:center;}
.chk-t{font-family:‘Playfair Display’,serif;font-size:17px;font-weight:700;}
.chk-x{background:none;border:none;color:#555;font-size:20px;cursor:pointer;}
.chk-bd{padding:18px;}
.fi{width:100%;background:#0d0000;border:1px solid #2a0000;color:var(–white);padding:9px 11px;font-family:inherit;font-size:12px;outline:none;margin-bottom:8px;}
.fi:focus{border-color:var(–gold);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.os{background:#0d0000;padding:11px;margin-bottom:13px;border:1px solid #2a0000;}
.os-t{font-size:10px;letter-spacing:0.2em;color:var(–gold);text-transform:uppercase;margin-bottom:7px;}
.or{display:flex;justify-content:space-between;font-size:12px;color:var(–mid);margin-bottom:4px;}
.or.tot{color:var(–white);font-weight:700;font-size:13px;border-top:1px solid #2a0000;padding-top:7px;margin-top:5px;}
.chk-btn{width:100%;background:var(–gold);border:none;color:#000;padding:13px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
.chk-btn:hover{background:var(–gold-light);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(–gold);color:#000;padding:9px 20px;font-size:12px;font-weight:700;letter-spacing:0.1em;opacity:0;pointer-events:none;transition:all 0.28s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
footer{background:#030000;border-top:1px solid #1a0000;padding:40px 24px 20px;margin-top:60px;}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:32px;margin-bottom:32px;}
.ft-title{font-family:‘Playfair Display’,serif;font-size:20px;font-weight:700;color:var(–gold);margin-bottom:10px;}
.ft-desc{color:#444;font-size:12px;line-height:1.75;}
.ft-h{font-size:10px;letter-spacing:0.25em;color:var(–gold);text-transform:uppercase;margin-bottom:12px;}
.ft-ul{list-style:none;}
.ft-ul li{margin-bottom:8px;}
.ft-ul a{color:#444;text-decoration:none;font-size:12px;cursor:pointer;}
.ft-ul a:hover{color:var(–white);}
.ft-bot{border-top:1px solid #1a0000;padding-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.ft-copy{color:#2a2a2a;font-size:11px;}
.ft-pays{display:flex;gap:5px;}
@media(max-width:650px){
.nav-s{display:none;}nav{padding:0 12px;}
.grid{grid-template-columns:repeat(2,1fr);}
.ft-grid{grid-template-columns:1fr;}
.cart-panel{width:100vw;}
.fr,.pfr{grid-template-columns:1fr;}
.prod-modal{grid-template-columns:1fr;}
.pimg-side{min-height:260px;max-height:300px;}
.pinfo{padding:16px;}
}
